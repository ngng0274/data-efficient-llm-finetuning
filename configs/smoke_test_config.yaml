model:
  name: "Qwen/Qwen2.5-3B"  # base model; LLaMA 3.2: meta-llama/Llama-3.2-3B
  dtype: "bfloat16"
  max_length: 256   # 짧게

lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  lora_dropout: 0.05
  bias: "none"

data:
  num_samples: 700    # train 500 + val 100 + test 100
  n_val: 100          # 정확한 카운트 지정 (val_ratio 대신)
  n_test: 100         # 정확한 카운트 지정 (test_ratio 대신)
  noise_ratio: 0.40
  noise_types:
    - response_swap
    - truncated_response
    - shuffled_sentences
  seed: 42

training:
  experiment_name: "smoke_test_noisy_base"
  output_dir: "outputs/smoke_test_noisy_base"
  num_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4   # effective batch = 8
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.10
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  eval_steps: 30
  save_steps: 30

wandb:
  enabled: false
  project: "noisy-llm-finetuning"
