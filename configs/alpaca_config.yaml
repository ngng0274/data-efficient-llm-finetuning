model:
  name: "Qwen/Qwen2.5-1.5B"
  dtype: "bfloat16"
  max_length: 512          # Cherry LLM 원본과 동일

lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  lora_dropout: 0.05
  bias: "none"

data:
  eval_path: "outputs/alpaca_splits/eval.json"    # A/B/C/D 공유 eval
  seed: 42

training:
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8     # effective batch = 32
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 20
  eval_steps: 100
  save_steps: 100
  save_total_limit: 1                # 최신 체크포인트만 보관 (디스크 절약)

wandb:
  enabled: false
  project: "alpaca-selection"
